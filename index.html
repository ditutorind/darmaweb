<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D'WALI - Digital Wali</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css" rel="stylesheet" type="text/css" />
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- SheetJS for Excel Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'dwali-dark': '#0f3d2e',
                        'dwali-green': '#166534',
                        'dwali-light': '#a7f3d0',
                        'dwali-yellow': '#facc15',
                        'dwali-red': '#ef4444',
                        'dwali-success': '#22c55e',
                    },
                    fontFamily: {
                        'jakarta': ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f3d2e;
            background-image: url('https://images.unsplash.com/photo-1497486751825-1233686d5d80?ixlib=rb-4.0.3&auto=format&fit=crop&w=1740&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .glass {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .glass-dark {
            background: rgba(15, 61, 46, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .chat-bubble-bot {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 16px 16px 16px 4px;
        }
        .chat-bubble-user {
            background: #facc15;
            color: #0f3d2e;
            border-radius: 16px 16px 4px 16px;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); }
        ::-webkit-scrollbar-thumb { background: #a7f3d0; border-radius: 10px; }
        
        .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top: 3px solid #facc15;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .page-enter-active, .page-leave-active {
            transition: all 0.3s ease;
        }
        .page-enter-from, .page-leave-to {
            opacity: 0;
            transform: translateY(20px);
        }
    </style>
</head>
<body class="min-h-screen text-white">

<div x-data="dwaliApp()" x-init="init()" class="min-h-screen flex flex-col">

    <!-- HEADER -->
    <header class="glass-dark text-white p-4 flex justify-between items-center sticky top-0 z-40">
        <div class="flex items-center gap-2 cursor-pointer" @click="goToHome()">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-dwali-yellow" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
            </svg>
            <h1 class="text-xl md:text-2xl font-extrabold tracking-wide">D'WALI</h1>
        </div>
        <div x-show="currentUser" class="flex items-center gap-3">
            <div class="text-right text-sm hidden md:block">
                <p class="font-bold" x-text="currentUser?.name"></p>
                <p class="text-xs text-dwali-light" x-text="currentUser?.role === 'admin' ? 'Wali Kelas' : 'Siswa - ' + currentUser?.class"></p>
            </div>
            <button @click="logout()" class="btn btn-sm btn-error btn-outline text-white border-white/20">Logout</button>
        </div>
    </header>

    <main class="flex-1 p-4 md:p-8 max-w-5xl mx-auto w-full">

        <!-- LOADING OVERLAY -->
        <div x-show="loading" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 backdrop-blur-sm">
            <div class="glass-dark p-8 rounded-2xl flex flex-col items-center gap-4 shadow-2xl">
                <div class="spinner"></div>
                <p class="text-white font-bold text-lg" x-text="loadingMessage || 'Memuat data...'"></p>
                <div class="w-48 h-1 bg-white/20 rounded-full overflow-hidden">
                    <div class="h-full bg-dwali-yellow rounded-full transition-all duration-500" :style="`width: ${loadingProgress}%`"></div>
                </div>
            </div>
        </div>

        <!-- LOGIN PAGE -->
        <template x-if="view === 'login'">
            <div class="flex items-center justify-center min-h-[80vh]">
                <div class="glass p-8 rounded-3xl w-full max-w-md text-center shadow-2xl">
                    <h2 class="text-3xl font-extrabold mb-2">Selamat Datang</h2>
                    <p class="text-dwali-light mb-6">Silakan masuk untuk melanjutkan</p>
                    
                    <div class="flex flex-col gap-3">
                        <button @click="view='student-login'" class="btn btn-block text-white border-dwali-light bg-dwali-green hover:bg-dwali-dark">Login sebagai Siswa</button>
                        <button @click="view='admin-login'" class="btn btn-block text-dwali-dark bg-dwali-yellow hover:bg-yellow-400 border-yellow-400">Login sebagai Wali Kelas</button>
                    </div>
                    
                    <div class="mt-6 text-xs text-dwali-light/70">
                        <p class="font-bold text-dwali-yellow">🔑 Akun Demo:</p>
                        <p>Siswa: Ahmad Fauzi | Kelas: 7A | Pass: siswa123</p>
                        <p>Wali: admin@dwali.com | Pass: admin123</p>
                    </div>
                </div>
            </div>
        </template>

        <!-- STUDENT LOGIN -->
        <template x-if="view === 'student-login'">
            <div class="flex items-center justify-center min-h-[80vh]">
                <div class="glass p-8 rounded-3xl w-full max-w-md shadow-2xl">
                    <h2 class="text-2xl font-bold mb-4 text-center">Login Siswa</h2>
                    <form @submit.prevent="studentLogin()" class="space-y-4">
                        <input type="text" x-model="loginForm.name" placeholder="Nama Siswa" class="input input-bordered w-full bg-white/20 text-white placeholder-gray-300 border-white/30" required>
                        <input type="text" x-model="loginForm.class" placeholder="Kelas (cth: 7A)" class="input input-bordered w-full bg-white/20 text-white placeholder-gray-300 border-white/30" required>
                        <input type="password" x-model="loginForm.password" placeholder="Password" class="input input-bordered w-full bg-white/20 text-white placeholder-gray-300 border-white/30" required>
                        <button type="submit" class="btn btn-block bg-dwali-yellow text-dwali-dark border-none hover:bg-yellow-400" :disabled="loading">
                            <span x-show="!loading">Masuk</span>
                            <span x-show="loading" class="spinner"></span>
                        </button>
                        <button type="button" @click="view='login'" class="text-xs text-dwali-light hover:underline w-full">&larr; Kembali</button>
                    </form>
                    <div class="mt-4 text-xs text-dwali-light/70 text-center">
                        <p class="font-bold text-dwali-yellow">📝 Contoh Akun:</p>
                        <p>Ahmad Fauzi, Budi Santoso, Citra Dewi, dll</p>
                        <p>Kelas: 7A | Password: siswa123</p>
                    </div>
                </div>
            </div>
        </template>

        <!-- ADMIN LOGIN -->
        <template x-if="view === 'admin-login'">
            <div class="flex items-center justify-center min-h-[80vh]">
                <div class="glass p-8 rounded-3xl w-full max-w-md shadow-2xl">
                    <h2 class="text-2xl font-bold mb-4 text-center">Login Wali Kelas</h2>
                    <form @submit.prevent="adminLogin()" class="space-y-4">
                        <input type="email" x-model="loginForm.email" placeholder="Email Wali" class="input input-bordered w-full bg-white/20 text-white placeholder-gray-300 border-white/30" required>
                        <input type="password" x-model="loginForm.password" placeholder="Password" class="input input-bordered w-full bg-white/20 text-white placeholder-gray-300 border-white/30" required>
                        <button type="submit" class="btn btn-block bg-dwali-yellow text-dwali-dark border-none hover:bg-yellow-400" :disabled="loading">
                            <span x-show="!loading">Masuk</span>
                            <span x-show="loading" class="spinner"></span>
                        </button>
                        <button type="button" @click="view='login'" class="text-xs text-dwali-light hover:underline w-full">&larr; Kembali</button>
                    </form>
                    <div class="mt-4 text-xs text-dwali-light/70 text-center">
                        <p class="font-bold text-dwali-yellow">📝 Contoh Akun:</p>
                        <p>Email: admin@dwali.com | Pass: admin123</p>
                        <p>Email: wali@dwali.com | Pass: wali123</p>
                    </div>
                </div>
            </div>
        </template>

        <!-- STUDENT DASHBOARD -->
        <template x-if="currentUser?.role === 'student' && view === 'student-dashboard'">
            <div class="space-y-6">
                <template x-if="!currentUser.is_potensi_filled">
                    <div class="glass p-6 rounded-3xl shadow-xl max-w-2xl mx-auto">
                        <h2 class="text-2xl font-bold mb-2">Peta Potensi Siswa 🗺️</h2>
                        <p class="text-dwali-light mb-6">Lengkapi data berikut 1 kali saja. Ini akan membantu walimu memahamimu lebih baik.</p>
                        
                        <div class="space-y-4">
                            <div>
                                <label class="label text-white">Minat</label>
                                <select x-model="potensiForm.minat" class="select select-bordered w-full bg-white/20 border-white/30">
                                    <option class="bg-dwali-dark" value="Olahraga">Olahraga</option>
                                    <option class="bg-dwali-dark" value="Seni">Seni</option>
                                    <option class="bg-dwali-dark" value="Sains">Sains</option>
                                    <option class="bg-dwali-dark" value="Teknologi">Teknologi</option>
                                    <option class="bg-dwali-dark" value="Bahasa">Bahasa</option>
                                    <option class="bg-dwali-dark" value="Lainnya">Lainnya</option>
                                </select>
                            </div>
                            <div>
                                <label class="label text-white">Gaya Belajar</label>
                                <select x-model="potensiForm.gaya_belajar" class="select select-bordered w-full bg-white/20 border-white/30">
                                    <option class="bg-dwali-dark" value="Visual">Visual</option>
                                    <option class="bg-dwali-dark" value="Auditori">Auditori</option>
                                    <option class="bg-dwali-dark" value="Kinestetik">Kinestetik</option>
                                    <option class="bg-dwali-dark" value="Baca/Tulis">Baca/Tulis</option>
                                </select>
                            </div>
                            <div>
                                <label class="label text-white">Cita-cita</label>
                                <textarea x-model="potensiForm.cita_cita" class="textarea textarea-bordered w-full bg-white/20 border-white/30" placeholder="Aku ingin menjadi..."></textarea>
                            </div>
                            <div>
                                <label class="label text-white">Kekuatan Karakter</label>
                                <select x-model="potensiForm.kekuatan_karakter" class="select select-bordered w-full bg-white/20 border-white/30">
                                    <option class="bg-dwali-dark" value="Pemberani">Pemberani</option>
                                    <option class="bg-dwali-dark" value="Baik Hati">Baik Hati</option>
                                    <option class="bg-dwali-dark" value="Kreatif">Kreatif</option>
                                    <option class="bg-dwali-dark" value="Pantang Menyerah">Pantang Menyerah</option>
                                    <option class="bg-dwali-dark" value="Disiplin">Disiplin</option>
                                    <option class="bg-dwali-dark" value="Pemimpin">Pemimpin</option>
                                    <option class="bg-dwali-dark" value="Jujur">Jujur</option>
                                </select>
                            </div>
                            <div>
                                <label class="label text-white">Ekstrakurikuler</label>
                                <input type="text" x-model="potensiForm.ekstrakurikuler" class="input input-bordered w-full bg-white/20 border-white/30" placeholder="cth: Pramuka, Futsal">
                            </div>
                            <button @click="savePotensi()" class="btn btn-block bg-dwali-success text-white border-none hover:bg-green-600 mt-4" :disabled="loading">
                                <span x-show="!loading">Simpan Peta Potensi</span>
                                <span x-show="loading" class="spinner"></span>
                            </button>
                        </div>
                    </div>
                </template>

                <template x-if="currentUser.is_potensi_filled">
                    <div>
                        <div class="glass p-6 rounded-3xl flex flex-col md:flex-row justify-between items-center">
                            <div>
                                <h2 class="text-2xl font-bold">Halo, <span x-text="currentUser.name"></span>! 👋</h2>
                                <p class="text-dwali-light">Kelas <span x-text="currentUser.class"></span></p>
                            </div>
                            <div class="mt-4 md:mt-0 text-center glass-dark p-3 rounded-xl">
                                <p class="text-xs text-dwali-light">Status Peta Potensi</p>
                                <p class="font-bold text-dwali-success">✅ Sudah Diisi</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4 mt-6">
                            <div @click="openGoodAction()" class="glass p-6 rounded-3xl flex flex-col items-center justify-center cursor-pointer hover:scale-105 transition-transform text-center">
                                <div class="text-5xl mb-2">⭐</div>
                                <p class="font-bold">Perbuatan Baik</p>
                                <p class="text-xs text-dwali-light" x-text="hasDoneGoodToday() ? '✔️ Sudah isi hari ini' : 'Klik untuk isi'"></p>
                            </div>

                            <div @click="navigateTo('student-jurnal')" class="glass p-6 rounded-3xl flex flex-col items-center justify-center cursor-pointer hover:scale-105 transition-transform text-center">
                                <div class="text-5xl mb-2">📔</div>
                                <p class="font-bold">Jurnal Harian</p>
                                <p class="text-xs text-dwali-light">Ceritakan harimu</p>
                            </div>

                            <div @click="navigateTo('student-curhat')" class="glass p-6 rounded-3xl flex flex-col items-center justify-center cursor-pointer hover:scale-105 transition-transform text-center col-span-2">
                                <div class="text-5xl mb-2">💬</div>
                                <p class="font-bold">Kontak Curhat</p>
                                <p class="text-xs text-dwali-light">Ada keluhan atau cerita? Sampaikan ke walimu.</p>
                            </div>

                            <div @click="navigateTo('student-riwayat')" class="glass p-6 rounded-3xl flex flex-col items-center justify-center cursor-pointer hover:scale-105 transition-transform text-center col-span-2">
                                <div class="text-5xl mb-2">📬</div>
                                <p class="font-bold">Riwayat Curhatku</p>
                                <p class="text-xs text-dwali-light">Cek balasan dari wali</p>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </template>

        <!-- MODAL: PERBUATAN BAIK -->
        <template x-if="modalGoodAction">
            <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" @click.self="modalGoodAction=false">
                <div class="glass-dark p-6 rounded-3xl w-full max-w-md">
                    <h3 class="text-xl font-bold mb-4 text-center">Pilih Perbuatan Baikmu 🌟</h3>
                    <div class="space-y-2">
                        <template x-for="act in goodActions">
                            <button @click="submitGoodAction(act)" class="btn btn-block glass text-white hover:bg-dwali-green border-none justify-start text-left" :disabled="loading">
                                <span x-text="act"></span>
                            </button>
                        </template>
                    </div>
                </div>
            </div>
        </template>

        <!-- STUDENT: JURNAL HARIAN -->
        <template x-if="view === 'student-jurnal'">
            <div class="space-y-4">
                <button @click="goBack()" class="text-dwali-light hover:underline">&larr; Kembali ke Dashboard</button>
                <div class="glass p-6 rounded-3xl">
                    <h2 class="text-2xl font-bold mb-4">Jurnal Harian 📔</h2>
                    
                    <label class="label text-white">Bagaimana perasaanmu hari ini?</label>
                    <div class="flex gap-2 mb-4 text-4xl">
                        <template x-for="m in ['😊', '😐', '😢', '😡', '😴']">
                            <button @click="jurnalForm.perasaan = m" :class="jurnalForm.perasaan === m ? 'bg-dwali-yellow scale-110' : 'bg-white/20'" class="p-2 rounded-xl transition-transform">
                                <span x-text="m"></span>
                            </button>
                        </template>
                    </div>

                    <label class="label text-white">Ceritakan harimu...</label>
                    <textarea x-model="jurnalForm.cerita" class="textarea textarea-bordered w-full bg-white/20 border-white/30 mb-4" rows="4"></textarea>

                    <button @click="saveJurnal()" class="btn btn-block bg-dwali-success text-white border-none" :disabled="loading">
                        <span x-show="!loading">Simpan Jurnal</span>
                        <span x-show="loading" class="spinner"></span>
                    </button>
                </div>

                <div class="glass p-6 rounded-3xl">
                    <h3 class="font-bold mb-3">Riwayat Jurnal</h3>
                    <div class="space-y-3 max-h-96 overflow-y-auto">
                        <template x-for="jrn in getMyJurnals()">
                            <div class="bg-white/10 p-3 rounded-xl">
                                <div class="flex justify-between text-xs text-dwali-light mb-1">
                                    <span x-text="formatDate(jrn.date)"></span>
                                    <span x-text="jrn.perasaan"></span>
                                </div>
                                <p x-text="jrn.cerita" class="text-sm"></p>
                            </div>
                        </template>
                        <div x-show="getMyJurnals().length === 0" class="text-center text-dwali-light py-4">Belum ada jurnal.</div>
                    </div>
                </div>
            </div>
        </template>

        <!-- STUDENT: CURHAT -->
        <template x-if="view === 'student-curhat'">
            <div class="space-y-4">
                <button @click="goBack(); resetCurhatForm()" class="text-dwali-light hover:underline">&larr; Kembali ke Dashboard</button>
                <div class="glass p-6 rounded-3xl min-h-[60vh] flex flex-col">
                    <h2 class="text-xl font-bold mb-4 text-center">Kontak Curhat 💬</h2>
                    
                    <div class="flex-1 space-y-3 overflow-y-auto mb-4">
                        <div class="chat chat-start">
                            <div class="chat-bubble-bot chat-bubble">Halo, aku di sini untuk mendengarkan. Siapakah kamu?</div>
                        </div>
                        
                        <template x-if="curhatForm.untuk_siapa">
                            <div class="chat chat-end">
                                <div class="chat-bubble-user chat-bubble" x-text="curhatForm.untuk_siapa"></div>
                            </div>
                        </template>
                        <template x-if="curhatForm.untuk_siapa && !curhatForm.kategori">
                            <div class="chat chat-start"><div class="chat-bubble-bot chat-bubble">Kategori, apakah ini masalah di rumah atau di sekolah?</div></div>
                        </template>

                        <template x-if="curhatForm.kategori">
                            <div class="chat chat-end"><div class="chat-bubble-user chat-bubble" x-text="curhatForm.kategori"></div></div>
                        </template>
                        <template x-if="curhatForm.kategori && !curhatForm.sub_kategori">
                            <div class="chat chat-start"><div class="chat-bubble-bot chat-bubble" x-text="curhatForm.kategori === 'Rumah' ? 'Masalah di rumah?' : 'Masalah di sekolah?'"></div></div>
                        </template>

                        <template x-if="curhatForm.sub_kategori">
                            <div class="chat chat-end"><div class="chat-bubble-user chat-bubble" x-text="curhatForm.sub_kategori"></div></div>
                        </template>
                        <template x-if="curhatForm.sub_kategori && !curhatForm.tingkat_darurat">
                            <div class="chat chat-start"><div class="chat-bubble-bot chat-bubble">Tingkat Darurat?</div></div>
                        </template>

                        <template x-if="curhatForm.tingkat_darurat">
                            <div class="chat chat-end"><div class="chat-bubble-user chat-bubble" x-text="curhatForm.tingkat_darurat"></div></div>
                        </template>
                        <template x-if="curhatForm.tingkat_darurat && !curhatForm.cerita">
                            <div class="chat chat-start"><div class="chat-bubble-bot chat-bubble">Masalahnya apa? Ceritakan bebas ya.</div></div>
                        </template>
                        
                        <template x-if="curhatForm.tingkat_darurat === 'Aku butuh bantuan sekarang'">
                            <div class="chat chat-start">
                                <div class="chat-bubble bg-dwali-red/80 chat-bubble">⚠️ Kami akan segera menghubungimu! Tetap tenang ya.</div>
                            </div>
                        </template>
                    </div>

                    <div class="border-t border-white/20 pt-4">
                        <template x-if="!curhatForm.untuk_siapa">
                            <div class="flex gap-2 justify-center flex-wrap">
                                <button @click="setCurhat('untuk_siapa', 'Aku sendiri')" class="btn btn-sm bg-dwali-yellow text-dwali-dark">Aku sendiri</button>
                                <button @click="setCurhat('untuk_siapa', 'Aku curhat untuk temanku')" class="btn btn-sm bg-dwali-light text-dwali-dark">Curhat untuk temanku</button>
                            </div>
                        </template>

                        <template x-if="curhatForm.untuk_siapa && !curhatForm.kategori">
                            <div class="flex gap-2 justify-center">
                                <button @click="setCurhat('kategori', 'Rumah')" class="btn btn-sm bg-dwali-yellow text-dwali-dark">Rumah</button>
                                <button @click="setCurhat('kategori', 'Sekolah')" class="btn btn-sm bg-dwali-light text-dwali-dark">Sekolah</button>
                            </div>
                        </template>

                        <template x-if="curhatForm.kategori === 'Rumah' && !curhatForm.sub_kategori">
                            <div class="flex gap-2 justify-center flex-wrap">
                                <button @click="setCurhat('sub_kategori', 'Orang tua')" class="btn btn-sm glass text-white">Orang tua</button>
                                <button @click="setCurhat('sub_kategori', 'Saudara')" class="btn btn-sm glass text-white">Saudara</button>
                                <button @click="setCurhat('sub_kategori', 'Keuangan')" class="btn btn-sm glass text-white">Keuangan</button>
                                <button @click="setCurhat('sub_kategori', 'Lainnya')" class="btn btn-sm glass text-white">Lainnya</button>
                            </div>
                        </template>

                        <template x-if="curhatForm.kategori === 'Sekolah' && !curhatForm.sub_kategori">
                            <div class="flex gap-2 justify-center flex-wrap">
                                <button @click="setCurhat('sub_kategori', 'Perundungan')" class="btn btn-sm glass text-white">Perundungan</button>

                                        <td class="font-bold" x-text="std.name"></td>

                                            <select x-model="laporanForm[std.id].sikap" class="select select-bordered bg-white/20 border-white/30 select-sm">

                                                <option class="bg-dwali-dark" value="Baik">Baik</option>
                                                <option class="bg-dwali-dark" value="Cukup">Cukup</option>
                                                <option class="bg-dwali-dark" value="Kurang">Kurang</option>
                                            </select>
                                        </td>
                                        <td>
                                            <input type="text" x-model="laporanForm[std.id].catatan_khusus" class="input input-bordered w-full max-w-xs bg-white/20 border-white/30 input-sm">

    <!-- TOAST -->
    <div x-show="toast.show" x-transition class="fixed bottom-10 left-1/2 -translate-x-1/2 z-50">
        <div class="glass-dark text-white px-6 py-3 rounded-full shadow-lg border border-dwali-yellow">
            <span x-text="toast.msg"></span>
        </div>
    </div>

</div>

<script>
// ============ KONFIGURASI ============
// ⚠️ GANTI DENGAN URL DEPLOYMENT ASLI!
const API_URL = 'https://script.google.com/macros/s/AKfycby3tP9jgosbYkm_Q-XuAb5-laG_iz0Wp3KpQbt8oEnORaguI9XnQYnkhy_UK-zEYlPJLg/exec';

async function callAPI(action, data = {}) {
    try {
        const url = `${API_URL}?action=${action}&data=${encodeURIComponent(JSON.stringify(data))}`;
        console.log('📤 Calling API:', action, data);
        
        const response = await fetch(url, {
            method: 'GET',
            headers: {
                'Accept': 'application/json',
            },
            mode: 'cors' // ← PASTIKAN CORS ENABLED
        });
        
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const result = await response.json();
        console.log('📥 API Response:', result);
        
        if (!result.success) {
            throw new Error(result.error || 'Terjadi kesalahan');
        }
        return result.data;
    } catch (error) {
        console.error('❌ API Error:', error);
        throw error;
    }
}

function dwaliApp() {
    return {
        view: 'login',
        currentUser: null,
        loginForm: { name: '', class: '', email: '', password: '' },
        loading: false,
        loadingMessage: 'Memuat data...',
        loadingProgress: 0,
        
        viewHistory: [],
        
        cachedStudents: [],
        cachedCurhats: [],
        cachedJurnals: [],
        cachedPotensi: [],
        cachedPerbuatanBaik: [],

        potensiForm: { minat: 'Olahraga', gaya_belajar: 'Visual', cita_cita: '', kekuatan_karakter: 'Pemberani', ekstrakurikuler: '' },
        jurnalForm: { perasaan: '', cerita: '' },
        curhatForm: { untuk_siapa: '', kategori: '', sub_kategori: '', tingkat_darurat: '', cerita: '' },
        tempCerita: '',
        modalGoodAction: false,
        goodActions: ['Aku membantu teman', 'Aku berbagi makanan', 'Aku menjaga kebersihan', 'Aku berkata jujur', 'Lainnya (tulis sendiri)'],
        newStudent: { name: '', nis: '' },
        replyText: {},
        laporanForm: {},
        toast: { show: false, msg: '' },

        init() {
            const savedUser = localStorage.getItem('dwali_user');
            if (savedUser) {
                try {
                    this.currentUser = JSON.parse(savedUser);
                    const defaultView = this.currentUser.role === 'admin' ? 'admin-dashboard' : 'student-dashboard';
                    this.view = defaultView;
                    this.viewHistory = [defaultView];
                    this.loadData();
                } catch(e) {
                    localStorage.removeItem('dwali_user');
                }
            }
        },

        showToast(msg) {
            this.toast.msg = msg;
            this.toast.show = true;
            setTimeout(() => this.toast.show = false, 3000);
        },

        navigateTo(view) {
            if (this.view === view) return;
            this.viewHistory.push(view);
            this.view = view;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        },

        goBack() {
            if (this.viewHistory.length > 1) {
                this.viewHistory.pop();
                this.view = this.viewHistory[this.viewHistory.length - 1];
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                this.goToHome();
            }
        },

        goToHome() {
            if (!this.currentUser) {
                this.view = 'login';
                this.viewHistory = ['login'];
                return;
            }
            const homeView = this.currentUser.role === 'admin' ? 'admin-dashboard' : 'student-dashboard';
            this.view = homeView;
            this.viewHistory = [homeView];
            window.scrollTo({ top: 0, behavior: 'smooth' });
        },

        async withLoading(message, callback) {
            this.loading = true;
            this.loadingMessage = message || 'Memuat data...';
            this.loadingProgress = 0;
            
            try {
                const progressInterval = setInterval(() => {
                    if (this.loadingProgress < 90) {
                        this.loadingProgress += Math.random() * 15;
                    }
                }, 200);
                
                const result = await callback();
                
                clearInterval(progressInterval);
                this.loadingProgress = 100;
                await new Promise(resolve => setTimeout(resolve, 300));
                return result;
            } finally {
                this.loading = false;
                this.loadingProgress = 0;
            }
        },

        async loadData() {
            if (!this.currentUser) return;
            await this.withLoading('Memuat data...', async () => {
                if (this.currentUser.role === 'admin') {
                    await this.loadStudents();
                    await this.loadCurhats();
                } else {
                    await this.loadMyJurnals();
                    await this.loadMyCurhats();
                    await this.loadPotensi();
                    await this.loadPerbuatanBaik();
                }
            });
        },

        // --- AUTH ---
        async studentLogin() {
            try {
                await this.withLoading('Login sebagai siswa...', async () => {
                    const result = await callAPI('loginStudent', {
                        name: this.loginForm.name,
                        class: this.loginForm.class,
                        password: this.loginForm.password
                    });
                    
                    console.log('🔐 Student login result:', result);
                    
                    if (!result || !result.id) {
                        throw new Error('Data siswa tidak valid!');
                    }
                    
                    this.currentUser = result;
                    localStorage.setItem('dwali_user', JSON.stringify(result));
                    const homeView = 'student-dashboard';
                    this.view = homeView;
                    this.viewHistory = [homeView];
                    this.showToast('✅ Login berhasil!');
                    await this.loadData();
                });
            } catch (error) {
                console.error('❌ Login error:', error);
                alert('❌ ' + (error.message || 'Login gagal! Cek koneksi atau data Anda.'));
            }
        },

        async adminLogin() {
            try {
                await this.withLoading('Login sebagai wali kelas...', async () => {
                    const result = await callAPI('loginAdmin', {
                        email: this.loginForm.email,
                        password: this.loginForm.password
                    });
                    
                    console.log('🔐 Admin login result:', result);
                    
                    if (!result || !result.id) {
                        throw new Error('Data admin tidak valid!');
                    }
                    
                    this.currentUser = result;
                    localStorage.setItem('dwali_user', JSON.stringify(result));
                    const homeView = 'admin-dashboard';
                    this.view = homeView;
                    this.viewHistory = [homeView];
                    this.showToast('✅ Selamat datang, Wali!');
                    await this.loadData();
                });
            } catch (error) {
                console.error('❌ Login error:', error);
                alert('❌ ' + (error.message || 'Login gagal! Cek koneksi atau data Anda.'));
            }
        },

        logout() {
            if(!confirm('Yakin mau logout?')) return;
            this.currentUser = null;
            this.view = 'login';
            this.viewHistory = ['login'];
            this.loginForm = { name: '', class: '', email: '', password: '' };
            localStorage.removeItem('dwali_user');
            this.cachedStudents = [];
            this.cachedCurhats = [];
            this.cachedJurnals = [];
            this.cachedPotensi = [];
            this.cachedPerbuatanBaik = [];
            this.laporanForm = {};
            this.replyText = {};
            this.showToast('👋 Sampai jumpa!');
        },

        // --- PETA POTENSI ---
        async savePotensi() {
            if (!this.potensiForm.cita_cita.trim()) {
                return alert('Cita-cita tidak boleh kosong!');
            }
            await this.withLoading('Menyimpan peta potensi...', async () => {
                await callAPI('savePotensi', {
                    student_id: this.currentUser.id,
                    ...this.potensiForm
                });
                this.currentUser.is_potensi_filled = true;
                localStorage.setItem('dwali_user', JSON.stringify(this.currentUser));
                this.showToast('✅ Peta Potensi tersimpan! 🗺️');
                await this.loadData();
            });
        },

        async loadPotensi() {
            try {
                const result = await callAPI('getPotensi', {
                    student_id: this.currentUser.id
                });
                this.cachedPotensi = result || [];
            } catch (error) {
                console.error('Error loading potensi:', error);
            }
        },

        // --- PERBUATAN BAIK ---
        openGoodAction() {
            if (this.hasDoneGoodToday()) {
                this.showToast('🌟 Kamu sudah mengisi perbuatan baik hari ini. Hebat!');
                return;
            }
            this.modalGoodAction = true;
        },

        hasDoneGoodToday() {
            const today = new Date().toISOString().split('T')[0];
            return this.cachedPerbuatanBaik.some(p => p.student_id === this.currentUser.id && p.date === today);
        },

        async submitGoodAction(action) {
            const today = new Date().toISOString().split('T')[0];
            await this.withLoading('Menyimpan perbuatan baik...', async () => {
                await callAPI('savePerbuatanBaik', {
                    student_id: this.currentUser.id,
                    action: action,
                    date: today
                });
                this.modalGoodAction = false;
                this.cachedPerbuatanBaik.push({ student_id: this.currentUser.id, action, date: today });
                const responses = ['🌟 Good Job! Kamu hebat!', '💪 Luar biasa! Pertahankan ya!', '😇 Kamu anak baik!'];
                this.showToast(responses[Math.floor(Math.random() * responses.length)]);
                await this.loadPerbuatanBaik();
            });
        },

        async loadPerbuatanBaik() {
            try {
                const result = await callAPI('getPerbuatanBaik', {
                    student_id: this.currentUser.id
                });
                this.cachedPerbuatanBaik = result || [];
            } catch (error) {
                console.error('Error loading perbuatan baik:', error);
            }
        },

        // --- CURHAT ---
        setCurhat(field, value) {
            this.curhatForm[field] = value;
        },

        resetCurhatForm() {
            this.curhatForm = { untuk_siapa: '', kategori: '', sub_kategori: '', tingkat_darurat: '', cerita: '' };
            this.tempCerita = '';
        },

        async submitCerita() {
            if (!this.tempCerita.trim()) return alert('Cerita tidak boleh kosong');
            this.curhatForm.cerita = this.tempCerita;
            await this.withLoading('Mengirim curhatan...', async () => {
                await callAPI('saveCurhat', {
                    id: 'c' + Date.now(),
                    student_id: this.currentUser.id,
                    ...this.curhatForm,
                    created_at: new Date().toISOString()
                });
                this.tempCerita = '';
                this.showToast('✅ Terima kasih sudah curhat, sabar ya menunggu balasan dari Wali.');
                await this.loadMyCurhats();
                setTimeout(() => {
                    this.goToHome();
                    this.resetCurhatForm();
                }, 3000);
            });
        },

        getMyCurhats() {
            return this.cachedCurhats
                .filter(c => c.student_id === this.currentUser.id)
                .sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
        },

        async loadMyCurhats() {
            try {
                const result = await callAPI('getCurhats', {
                    student_id: this.currentUser.id
                });
                this.cachedCurhats = result || [];
            } catch (error) {
                console.error('Error loading curhats:', error);
            }
        },

        // --- JURNAL ---
        async saveJurnal() {
            if (!this.jurnalForm.perasaan || !this.jurnalForm.cerita) {
                return alert('Lengkapi perasaan dan cerita');
            }
            const today = new Date().toISOString().split('T')[0];
            await this.withLoading('Menyimpan jurnal...', async () => {
                await callAPI('saveJurnal', {
                    student_id: this.currentUser.id,
                    ...this.jurnalForm,
                    date: today
                });
                this.jurnalForm = { perasaan: '', cerita: '' };
                this.showToast('📔 Jurnal harian tersimpan!');
                await this.loadMyJurnals();
            });
        },

        getMyJurnals() {
            return this.cachedJurnals
                .filter(j => j.student_id === this.currentUser.id)
                .sort((a,b) => new Date(b.date) - new Date(a.date));
        },

        async loadMyJurnals() {
            try {
                const result = await callAPI('getJurnals', {
                    student_id: this.currentUser.id
                });
                this.cachedJurnals = result || [];
            } catch (error) {
                console.error('Error loading jurnals:', error);
            }
        },

        // --- ADMIN: SISWA ---
        getMyStudents() {
            if (!this.currentUser) return [];
            return this.cachedStudents.filter(s => s.wali_id === this.currentUser.id);
        },

        async loadStudents() {
            if (!this.currentUser) return;
            try {
                const result = await callAPI('getStudents', {
                    wali_id: this.currentUser.id
                });
                this.cachedStudents = result || [];
                this.initLaporanForm();
            } catch (error) {
                console.error('Error loading students:', error);
            }
        },

        async addStudent() {
            if (!this.newStudent.name || !this.newStudent.nis) {
                return alert('Nama dan NIS wajib diisi');
            }
            if (!/^[0-9]+$/.test(this.newStudent.nis)) {
                return alert('NIS harus berupa angka!');
            }
            if (this.cachedStudents.some(s => s.nis === this.newStudent.nis)) {
                return alert('NIS sudah terdaftar!');
            }
            await this.withLoading('Menambahkan siswa...', async () => {
                await callAPI('addStudent', {
                    nis: this.newStudent.nis,
                    name: this.newStudent.name,
                    wali_id: this.currentUser.id,
                    class: this.currentUser.class
                });
                this.newStudent = { name: '', nis: '' };
                this.showToast('✅ Siswa berhasil ditambahkan!');
                await this.loadStudents();
            });
        },

        async resetPassword(id) {
            if (!confirm('Reset password siswa ke default (siswa123)?')) return;
            await this.withLoading('Merreset password...', async () => {
                await callAPI('resetPassword', { student_id: id });
                this.showToast('✅ Password direset!');
            });
        },

        async deleteStudent(id) {
            if (!confirm('Yakin hapus siswa ini?')) return;
            await this.withLoading('Menghapus siswa...', async () => {
                await callAPI('deleteStudent', { student_id: id });
                this.showToast('✅ Siswa dihapus.');
                await this.loadStudents();
            });
        },

        getStudentStatusColor(id) {
            const curhats = this.cachedCurhats.filter(c => c.student_id === id && !c.balasan);
            if (curhats.some(c => c.tingkat_darurat === 'Aku butuh bantuan sekarang')) return 'bg-dwali-red';
            if (curhats.length > 0) return 'bg-dwali-yellow';
            return 'bg-dwali-success';
        },

        // --- ADMIN: CURHAT ---
        getAdminCurhats() {
            const myStudentIds = this.getMyStudents().map(s => s.id);
            return this.cachedCurhats
                .filter(c => myStudentIds.includes(c.student_id))
                .sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
        },

        async loadCurhats() {
            if (!this.currentUser) return;
            try {
                const result = await callAPI('getCurhats', {
                    wali_id: this.currentUser.id
                });
                this.cachedCurhats = result || [];
                this.cachedCurhats.forEach(c => {
                    if (!c.balasan && !this.replyText[c.id]) {
                        this.replyText[c.id] = '';
                    }
                });
            } catch (error) {
                console.error('Error loading curhats:', error);
            }
        },

        getStudentName(id) {
            const std = this.cachedStudents.find(s => s.id === id);
            return std ? std.name : 'Unknown';
        },

        async replyCurhat(curhatId) {
            const reply = this.replyText[curhatId];
            if (!reply || !reply.trim()) return alert('Balasan tidak boleh kosong');
            await this.withLoading('Mengirim balasan...', async () => {
                await callAPI('replyCurhat', {
                    curhat_id: curhatId,
                    balasan: reply.trim(),
                    balasan_at: new Date().toISOString()
                });
                const curhat = this.cachedCurhats.find(c => c.id === curhatId);
                if (curhat) {
                    curhat.balasan = reply.trim();
                    curhat.balasan_at = new Date().toISOString();
                }
                this.replyText[curhatId] = '';
                this.showToast('✅ Balasan terkirim!');
                await this.loadCurhats();
            });
        },

        countCurhatByStatus(type) {
            const curhats = this.getAdminCurhats().filter(c => !c.balasan);
            if (type === 'emergency') {
                return curhats.filter(c => c.tingkat_darurat === 'Aku butuh bantuan sekarang').length;
            }
            if (type === 'normal') {
                return curhats.filter(c => c.tingkat_darurat !== 'Aku butuh bantuan sekarang').length;
            }
            return 0;
        },

        // --- ADMIN: LAPORAN ---
        initLaporanForm() {
            this.getMyStudents().forEach(std => {
                if (!this.laporanForm[std.id]) {
                    this.laporanForm[std.id] = { 
                        nilai_akademik: 70, 
                        sikap: 'Baik', 
                        catatan_khusus: '' 
                    };
                }
            });
        },

        exportExcel() {
            const data = [];
            this.getMyStudents().forEach(std => {
                const potensi = this.cachedPotensi.find(p => p.student_id === std.id) || {};
                const baik = this.cachedPerbuatanBaik.filter(p => p.student_id === std.id).length;
                const jurnal = this.cachedJurnals.filter(j => j.student_id === std.id).length;
                const laporan = this.laporanForm[std.id] || {};

                data.push({
                    'NIS': std.nis,
                    'Nama Siswa': std.name,
                    'Kelas': std.class,
                    'Minat': potensi.minat || '-',
                    'Gaya Belajar': potensi.gaya_belajar || '-',
                    'Cita-cita': potensi.cita_cita || '-',
                    'Kekuatan Karakter': potensi.kekuatan_karakter || '-',
                    'Ekstrakurikuler': potensi.ekstrakurikuler || '-',
                    'Nilai Akademik': laporan.nilai_akademik || 0,
                    'Sikap': laporan.sikap || '-',
                    'Catatan Khusus': laporan.catatan_khusus || '-',
                    'Total Perbuatan Baik': baik,
                    'Total Jurnal': jurnal
                });
            });

            if (data.length === 0) {
                return alert('Belum ada data siswa untuk diexport!');
            }

            const ws = XLSX.utils.json_to_sheet(data);
            const wsCols = Object.keys(data[0] || {a:1}).map(key => ({ wpx: 120 }));
            ws['!cols'] = wsCols;

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Laporan Siswa");
            XLSX.writeFile(wb, "Laporan_DWali.xlsx");
            this.showToast('📥 Excel berhasil diunduh!');
        },

        formatDate(dateStr) {
            if (!dateStr) return '-';
            try {
                const d = new Date(dateStr);
                return d.toLocaleDateString('id-ID', { 
                    day: '2-digit', 
                    month: 'short', 
                    year: 'numeric', 
                    hour: '2-digit', 
                    minute: '2-digit' 
                });
            } catch {
                return dateStr;
            }
        }
    }
}
</script>
