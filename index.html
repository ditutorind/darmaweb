<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D'WALI - Digital Wali</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .glass-dark {
            background: rgba(6, 78, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        [x-cloak] { display: none !important; }
        .btn-primary { background: #fbbf24; color: #064e3b; font-weight: 700; padding: 0.75rem 1.5rem; border-radius: 0.75rem; transition: all 0.3s; }
        .btn-primary:hover { background: #f59e0b; transform: scale(1.02); }
        .btn-green { background: #059669; color: white; font-weight: 700; padding: 0.75rem 1.5rem; border-radius: 0.75rem; transition: all 0.3s; }
        .btn-green:hover { background: #047857; transform: scale(1.02); }
        .btn-red { background: #dc2626; color: white; font-weight: 700; padding: 0.5rem 1rem; border-radius: 0.5rem; transition: all 0.3s; }
        .btn-red:hover { background: #b91c1c; }
    </style>
</head>
<body class="min-h-screen bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1577896851231-70ef18881754?q=80&w=2070&auto=format&fit=crop');">

<div x-data="dWaliApp()" x-init="init()" class="min-h-screen w-full flex justify-center text-white">

    <!-- NOTIFICATION -->
    <div x-show="notif.show" x-transition class="fixed top-4 left-1/2 -translate-x-1/2 z-50 glass-dark px-6 py-3 rounded-xl shadow-lg">
        <span x-text="notif.text"></span>
    </div>

    <!-- LOGIN -->
    <div x-show="!isLoggedIn" class="w-full max-w-md p-6 flex flex-col justify-center min-h-screen">
        <div class="glass rounded-3xl p-8 text-center shadow-2xl">
            <div class="w-24 h-24 rounded-full bg-yellow-400/30 mx-auto mb-4 flex items-center justify-center text-5xl">📚</div>
            <h1 class="text-3xl font-extrabold text-yellow-300 tracking-wide">D'WALI</h1>
            <p class="text-green-100 text-sm mb-6">Digital Wali Murid</p>
            
            <div class="flex gap-2 mb-6 bg-black/20 p-1 rounded-full">
                <button @click="loginRole='student'" :class="loginRole==='student' ? 'bg-yellow-400 text-green-900' : 'text-white'" class="flex-1 py-2 rounded-full font-semibold transition">Siswa</button>
                <button @click="loginRole='admin'" :class="loginRole==='admin' ? 'bg-yellow-400 text-green-900' : 'text-white'" class="flex-1 py-2 rounded-full font-semibold transition">Wali Kelas</button>
            </div>

            <div x-show="loginRole==='student'" class="space-y-3">
                <input type="text" x-model="loginForm.name" placeholder="Nama Siswa" class="w-full px-4 py-3 rounded-xl bg-white/20 placeholder-green-100 focus:outline-none focus:ring-2 focus:ring-yellow-300">
                <input type="text" x-model="loginForm.class" placeholder="Kelas (Misal: 7A)" class="w-full px-4 py-3 rounded-xl bg-white/20 placeholder-green-100 focus:outline-none focus:ring-2 focus:ring-yellow-300">
                <input type="password" x-model="loginForm.pin" placeholder="PIN (51sw@qu)" class="w-full px-4 py-3 rounded-xl bg-white/20 placeholder-green-100 focus:outline-none focus:ring-2 focus:ring-yellow-300">
                <button @click="loginStudent()" class="btn-primary w-full">Masuk</button>
            </div>

            <div x-show="loginRole==='admin'" class="space-y-3">
                <input type="email" x-model="loginForm.email" placeholder="Email Wali" class="w-full px-4 py-3 rounded-xl bg-white/20 placeholder-green-100 focus:outline-none focus:ring-2 focus:ring-yellow-300">
                <input type="password" x-model="loginForm.pass" placeholder="Password (d4Rm@app*)" class="w-full px-4 py-3 rounded-xl bg-white/20 placeholder-green-100 focus:outline-none focus:ring-2 focus:ring-yellow-300">
                <button @click="loginAdmin()" class="btn-primary w-full">Masuk</button>
            </div>
        </div>
    </div>

    <!-- STUDENT VIEW -->
    <div x-show="isLoggedIn && role==='student'" class="w-full max-w-md pb-24 relative">
        
        <!-- PETA POTENSI -->
        <div x-show="studentView==='potensi'" class="absolute inset-0 z-40 bg-black/60 flex items-center justify-center p-4 overflow-y-auto">
            <div class="glass rounded-3xl p-6 w-full my-10">
                <h2 class="text-2xl font-bold text-yellow-300 mb-2">🌟 Peta Potensi</h2>
                <p class="text-sm text-green-100 mb-4">Lengkapi data diri ini sekali saja.</p>
                
                <div class="space-y-4 text-sm">
                    <div>
                        <label class="font-semibold block mb-2">Minat</label>
                        <div class="flex flex-wrap gap-2">
                            <template x-for="m in ['Olahraga','Seni','Sains','Teknologi','Bahasa','Lainnya']">
                                <button @click="potensiForm.minat = m" :class="potensiForm.minat===m ? 'bg-yellow-400 text-green-900' : 'bg-white/20'" class="px-3 py-1 rounded-full text-xs" x-text="m"></button>
                            </template>
                        </div>
                    </div>
                    <div>
                        <label class="font-semibold block mb-2">Gaya Belajar</label>
                        <div class="flex flex-wrap gap-2">
                            <template x-for="g in ['Visual','Auditori','Kinestetik','Baca/Tulis']">
                                <button @click="potensiForm.gaya = g" :class="potensiForm.gaya===g ? 'bg-yellow-400 text-green-900' : 'bg-white/20'" class="px-3 py-1 rounded-full text-xs" x-text="g"></button>
                            </template>
                        </div>
                    </div>
                    <div>
                        <label class="font-semibold block mb-2">Cita-cita</label>
                        <textarea x-model="potensiForm.cita_cita" class="w-full bg-white/20 rounded-xl p-3 text-white placeholder-green-100" rows="2" placeholder="Saya ingin menjadi..."></textarea>
                    </div>
                    <div>
                        <label class="font-semibold block mb-2">Kekuatan Karakter</label>
                        <div class="flex flex-wrap gap-2">
                            <template x-for="k in ['Pemberani','Baik Hati','Kreatif','Pantang Menyerah','Disiplin','Pemimpin','Jujur']">
                                <button @click="potensiForm.karakter = k" :class="potensiForm.karakter===k ? 'bg-yellow-400 text-green-900' : 'bg-white/20'" class="px-3 py-1 rounded-full text-xs" x-text="k"></button>
                            </template>
                        </div>
                    </div>
                    <div>
                        <label class="font-semibold block mb-2">Ekstrakurikuler</label>
                        <input type="text" x-model="potensiForm.ekskul" class="w-full bg-white/20 rounded-xl p-3 text-white placeholder-green-100" placeholder="Pramuka, Futsal, dll">
                    </div>
                </div>
                <button @click="savePotensi()" class="btn-green w-full mt-6">Simpan & Lanjut</button>
            </div>
        </div>

        <!-- DASHBOARD -->
        <div x-show="studentView==='dashboard'" class="min-h-screen p-6">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <p class="text-green-100 text-sm">Selamat datang,</p>
                    <h1 class="text-2xl font-bold" x-text="currentUser?.name || 'Siswa'"></h1>
                </div>
                <button @click="logout()" class="glass-dark px-4 py-2 rounded-xl text-sm">Keluar</button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2 glass rounded-3xl p-6 text-center">
                    <h3 class="font-bold text-lg mb-3">⭐ Perbuatan Baik Hari Ini</h3>
                    <template x-if="!currentUser?.perbuatan_baik_today">
                        <button @click="openModal('perbuatanBaik')" class="bg-yellow-400 text-green-900 text-5xl w-20 h-20 rounded-full mx-auto flex items-center justify-center shadow-lg hover:scale-110 transition">⭐</button>
                    </template>
                    <template x-if="currentUser?.perbuatan_baik_today">
                        <div class="text-green-300 font-bold py-4">✔️ Sudah Berbuat Baik Hari Ini!</div>
                    </template>
                </div>

                <button @click="openModal('curhat')" class="glass rounded-3xl p-6 text-center hover:scale-105 transition">
                    <div class="text-4xl mb-2">💬</div>
                    <div class="font-semibold">Curhat</div>
                </button>

                <button @click="openModal('jurnal')" class="glass rounded-3xl p-6 text-center hover:scale-105 transition">
                    <div class="text-4xl mb-2">📔</div>
                    <div class="font-semibold">Jurnal</div>
                </button>

                <button @click="studentView='riwayat'" class="col-span-2 glass rounded-3xl p-6 text-center flex items-center justify-between hover:scale-[1.02] transition">
                    <div class="text-left">
                        <div class="font-semibold text-lg">Riwayat Curhat</div>
                        <div class="text-xs text-green-100">Lihat balasan dari wali</div>
                    </div>
                    <div class="text-4xl">📨</div>
                </button>
            </div>
        </div>

        <!-- RIWAYAT -->
        <div x-show="studentView==='riwayat'" class="min-h-screen p-6">
            <button @click="studentView='dashboard'" class="mb-4 text-sm flex items-center gap-2">← Kembali</button>
            <h2 class="text-2xl font-bold mb-4">Riwayat Curhat</h2>
            <div class="space-y-3">
                <template x-for="c in curhats.filter(c => c.student_id === currentUser?.id)" :key="c.id">
                    <div class="glass rounded-2xl p-4">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs text-green-100" x-text="new Date(c.created_at).toLocaleDateString()"></span>
                            <span :class="c.balasan ? 'bg-green-500' : 'bg-yellow-400 text-green-900'" class="text-xs px-2 py-1 rounded-full font-semibold" x-text="c.balasan ? 'Dibalas' : 'Menunggu'"></span>
                        </div>
                        <p class="text-sm mb-2" x-text="c.cerita"></p>
                        <div x-show="c.balasan" class="bg-black/20 p-3 rounded-xl mt-2">
                            <p class="text-xs text-yellow-300 font-bold mb-1">Balasan Wali:</p>
                            <p class="text-sm" x-text="c.balasan"></p>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- MODAL PERBUATAN BAIK -->
        <div x-show="activeModal==='perbuatanBaik'" x-transition class="fixed inset-0 z-50 bg-black/60 flex items-end justify-center" @click.self="activeModal=null">
            <div class="glass w-full max-w-md rounded-t-3xl p-6">
                <h3 class="text-xl font-bold mb-4 text-center">Apa yang kamu lakukan?</h3>
                <div class="space-y-2">
                    <template x-for="act in ['Membantu teman', 'Berbagi makanan', 'Menjaga kebersihan', 'Berkata jujur', 'Lainnya']">
                        <button @click="savePerbuatanBaik(act)" class="w-full bg-white/20 hover:bg-yellow-400 hover:text-green-900 transition py-3 rounded-xl font-semibold" x-text="act"></button>
                    </template>
                </div>
            </div>
        </div>

        <!-- MODAL JURNAL -->
        <div x-show="activeModal==='jurnal'" x-transition class="fixed inset-0 z-50 bg-black/60 flex items-end justify-center" @click.self="activeModal=null">
            <div class="glass w-full max-w-md rounded-t-3xl p-6">
                <h3 class="text-xl font-bold mb-4 text-center">Jurnal Hari Ini</h3>
                <label class="text-sm text-green-100">Bagaimana perasaanmu?</label>
                <div class="flex justify-around my-4 text-4xl">
                    <template x-for="e in ['😊','😐','😢','😡','😴']">
                        <button @click="jurnalForm.perasaan = e" :class="jurnalForm.perasaan===e ? 'scale-125 bg-white/20 rounded-full p-2' : ''" x-text="e"></button>
                    </template>
                </div>
                <textarea x-model="jurnalForm.cerita" class="w-full bg-white/20 rounded-xl p-3 text-white placeholder-green-100" rows="3" placeholder="Ceritakan harimu..."></textarea>
                <button @click="saveJurnal()" class="btn-green w-full mt-4">Simpan Jurnal</button>
            </div>
        </div>

        <!-- MODAL CURHAT -->
        <div x-show="activeModal==='curhat'" x-transition class="fixed inset-0 z-50 bg-black/80 flex flex-col p-4">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold">💬 Curhat Wali</h3>
                <button @click="activeModal=null" class="text-red-400">Tutup</button>
            </div>
            <div class="flex-1 overflow-y-auto space-y-3 mb-4 scrollbar-hide">
                <template x-for="(msg, i) in curhatChat" :key="i">
                    <div :class="msg.type === 'bot' ? 'text-left' : 'text-right'">
                        <div :class="msg.type === 'bot' ? 'bg-white/20' : 'bg-yellow-400 text-green-900'" class="inline-block px-4 py-2 rounded-2xl max-w-[80%]" x-text="msg.text"></div>
                    </div>
                </template>
                
                <div x-show="curhatStep === 1" class="flex gap-2 justify-end">
                    <button @click="answerCurhat('untuk', 'Aku sendiri')" class="bg-yellow-400 text-green-900 px-4 py-2 rounded-full text-sm font-semibold">Aku sendiri</button>
                    <button @click="answerCurhat('untuk', 'Temanku')" class="bg-yellow-400 text-green-900 px-4 py-2 rounded-full text-sm font-semibold">Curhat teman</button>
                </div>
                <div x-show="curhatStep === 2" class="flex gap-2 justify-end">
                    <button @click="answerCurhat('kategori', 'Rumah')" class="bg-yellow-400 text-green-900 px-4 py-2 rounded-full text-sm font-semibold">Rumah</button>
                    <button @click="answerCurhat('kategori', 'Sekolah')" class="bg-yellow-400 text-green-900 px-4 py-2 rounded-full text-sm font-semibold">Sekolah</button>
                </div>
                <div x-show="curhatStep === 3 && curhatForm.kategori === 'Rumah'" class="flex flex-wrap gap-2 justify-end">
                    <template x-for="s in ['Orang tua','Saudara','Keuangan','Lainnya']">
                        <button @click="answerCurhat('sub', s)" class="bg-yellow-400 text-green-900 px-4 py-2 rounded-full text-sm font-semibold" x-text="s"></button>
                    </template>
                </div>
                <div x-show="curhatStep === 3 && curhatForm.kategori === 'Sekolah'" class="flex flex-wrap gap-2 justify-end">
                    <template x-for="s in ['Perundungan','Pelajaran','Teman','Guru','Lainnya']">
                        <button @click="answerCurhat('sub', s)" class="bg-yellow-400 text-green-900 px-4 py-2 rounded-full text-sm font-semibold" x-text="s"></button>
                    </template>
                </div>
                <div x-show="curhatStep === 4" class="flex gap-2 justify-end">
                    <button @click="answerCurhat('darurat', 'Cerita')" class="bg-green-500 px-4 py-2 rounded-full text-sm font-semibold">Mau cerita</button>
                    <button @click="answerCurhat('darurat', 'Saran')" class="bg-yellow-400 text-green-900 px-4 py-2 rounded-full text-sm font-semibold">Butuh saran</button>
                    <button @click="answerCurhat('darurat', 'Bantuan')" class="bg-red-500 px-4 py-2 rounded-full text-sm font-semibold">Bantuan Sekarang!</button>
                </div>
                <div x-show="curhatStep === 5" class="mt-4">
                    <textarea x-model="curhatForm.cerita" class="w-full bg-white/20 rounded-xl p-3 text-white" rows="4" placeholder="Ceritakan masalahnya..."></textarea>
                    <button @click="submitCurhat()" class="btn-green w-full mt-2">Kirim Curhat</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ADMIN VIEW -->
    <div x-show="isLoggedIn && role==='admin'" class="w-full max-w-4xl pb-24 p-4 md:p-8">
        
        <div class="flex justify-between items-center mb-6">
            <div>
                <p class="text-green-100 text-sm">Dashboard Wali Kelas</p>
                <h1 class="text-2xl md:text-3xl font-bold" x-text="currentUser?.name || 'Admin'"></h1>
            </div>
            <button @click="logout()" class="glass-dark px-4 py-2 rounded-xl text-sm">Keluar</button>
        </div>

        <div class="flex gap-2 mb-6 glass-dark p-1 rounded-full overflow-x-auto scrollbar-hide">
            <button @click="adminView='siswa'" :class="adminView==='siswa' ? 'bg-yellow-400 text-green-900' : ''" class="flex-1 whitespace-nowrap py-2 px-4 rounded-full font-semibold text-sm">Siswa</button>
            <button @click="adminView='curhat'" :class="adminView==='curhat' ? 'bg-yellow-400 text-green-900' : ''" class="flex-1 whitespace-nowrap py-2 px-4 rounded-full font-semibold text-sm">Curhat</button>
            <button @click="adminView='laporan'" :class="adminView==='laporan' ? 'bg-yellow-400 text-green-900' : ''" class="flex-1 whitespace-nowrap py-2 px-4 rounded-full font-semibold text-sm">Laporan</button>
            <button @click="adminView='kelola'" :class="adminView==='kelola' ? 'bg-yellow-400 text-green-900' : ''" class="flex-1 whitespace-nowrap py-2 px-4 rounded-full font-semibold text-sm">Kelola</button>
        </div>

        <!-- DAFTAR SISWA -->
        <div x-show="adminView==='siswa'" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <template x-for="s in students" :key="s.id">
                <div class="glass rounded-2xl p-4 flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-yellow-400 text-green-900 flex items-center justify-center font-bold text-xl" x-text="s.name?.charAt(0) || '?'"></div>
                    <div class="flex-1">
                        <h3 class="font-bold" x-text="s.name"></h3>
                        <p class="text-xs text-green-100" x-text="(s.nis || '') + ' - ' + (s.class || '')"></p>
                    </div>
                    <div class="text-2xl" x-text="getStudentStatus(s.id)"></div>
                </div>
            </template>
        </div>

        <!-- INBOX CURHAT -->
        <div x-show="adminView==='curhat'" class="space-y-4">
            <template x-for="c in curhats" :key="c.id">
                <div class="glass rounded-2xl p-4">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <h3 class="font-bold" x-text="getStudentName(c.student_id)"></h3>
                            <p class="text-xs text-green-100" x-text="new Date(c.created_at).toLocaleString()"></p>
                        </div>
                        <span class="text-xs px-2 py-1 rounded-full font-semibold"
                              :class="c.tingkat_darurat === 'Bantuan' ? 'bg-red-500' : (c.tingkat_darurat === 'Saran' ? 'bg-yellow-400 text-green-900' : 'bg-green-500')"
                              x-text="c.tingkat_darurat || 'Normal'"></span>
                    </div>
                    <div class="text-xs text-green-100 mb-2">Kategori: <span x-text="(c.kategori || '') + ' - ' + (c.sub || '')"></span></div>
                    <p class="text-sm bg-black/20 p-3 rounded-xl mb-3" x-text="c.cerita"></p>
                    
                    <div x-show="!c.balasan">
                        <textarea x-model="tempReply" class="w-full bg-white/20 rounded-xl p-2 text-sm mb-2" rows="2" placeholder="Tulis balasan..."></textarea>
                        <button @click="replyCurhat(c.id)" class="bg-yellow-400 text-green-900 px-4 py-2 rounded-lg text-sm font-bold">Kirim Balasan</button>
                    </div>
                    <div x-show="c.balasan" class="bg-green-500/30 p-3 rounded-xl">
                        <p class="text-xs text-yellow-300 font-bold">Balasan Wali:</p>
                        <p class="text-sm" x-text="c.balasan"></p>
                    </div>
                </div>
            </template>
        </div>

        <!-- LAPORAN -->
        <div x-show="adminView==='laporan'" class="glass rounded-2xl p-4 overflow-x-auto">
            <div class="flex justify-between mb-4">
                <h2 class="text-xl font-bold">📊 Laporan Siswa</h2>
                <button @click="exportExcel()" class="bg-green-600 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2">📥 Download Excel</button>
            </div>
            <table class="w-full text-sm min-w-[600px]">
                <thead>
                    <tr class="border-b border-white/20 text-left">
                        <th class="p-2">Nama</th>
                        <th class="p-2">NIS</th>
                        <th class="p-2">Kelas</th>
                        <th class="p-2">Nilai</th>
                        <th class="p-2">Sikap</th>
                        <th class="p-2">Catatan</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="s in students" :key="s.id">
                        <tr class="border-b border-white/10">
                            <td class="p-2" x-text="s.name"></td>
                            <td class="p-2" x-text="s.nis"></td>
                            <td class="p-2" x-text="s.class"></td>
                            <td class="p-2"><input type="number" x-model="s.nilai" class="w-16 bg-white/10 p-1 rounded"></td>
                            <td class="p-2">
                                <select x-model="s.sikap" class="bg-white/10 p-1 rounded text-black">
                                    <option value="Sangat Baik">Sangat Baik</option>
                                    <option value="Baik">Baik</option>
                                    <option value="Cukup">Cukup</option>
                                    <option value="Kurang">Kurang</option>
                                </select>
                            </td>
                            <td class="p-2"><input type="text" x-model="s.catatan" class="w-full bg-white/10 p-1 rounded"></td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <!-- KELOLA SISWA -->
        <div x-show="adminView==='kelola'" class="space-y-4">
            <div class="glass rounded-2xl p-4">
                <h3 class="font-bold mb-3">Tambah Siswa Baru</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-2">
                    <input type="text" x-model="newStudent.name" placeholder="Nama" class="bg-white/20 p-2 rounded-lg">
                    <input type="text" x-model="newStudent.nis" placeholder="NIS" class="bg-white/20 p-2 rounded-lg">
                    <input type="text" x-model="newStudent.class" placeholder="Kelas" class="bg-white/20 p-2 rounded-lg">
                    <button @click="addStudent()" class="bg-yellow-400 text-green-900 font-bold rounded-lg py-2">Tambah</button>
                </div>
            </div>
            <div class="space-y-2">
                <template x-for="s in students" :key="s.id">
                    <div class="glass rounded-xl p-3 flex justify-between items-center">
                        <span x-text="s.name + ' (' + (s.nis || '') + ')'"></span>
                        <div class="flex gap-2">
                            <button @click="resetPass(s.id)" class="bg-yellow-400 text-green-900 text-xs px-3 py-1 rounded-lg">Reset PW</button>
                            <button @click="deleteStudent(s.id)" class="btn-red text-xs">Hapus</button>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>
</div>

<script>
function dWaliApp() {
    return {
        // ============ STATE ============
        isLoggedIn: false,
        role: 'student',
        loginRole: 'student',
        loginForm: { name: 'Budi', class: '7A', pin: '51sw@qu', email: 'wali@dwali.com', pass: 'd4Rm@app*' },
        currentUser: null,
        
        studentView: 'dashboard',
        adminView: 'siswa',
        activeModal: null,
        notif: { show: false, text: '' },

        // ============ DATA ============
        students: [],
        curhats: [],
        
        potensiForm: { minat: '', gaya: '', cita_cita: '', karakter: '', ekskul: '' },
        jurnalForm: { perasaan: '', cerita: '' },
        newStudent: { name: '', nis: '', class: '' },
        tempReply: '',

        curhatStep: 0,
        curhatChat: [],
        curhatForm: { untuk: '', kategori: '', sub: '', darurat: '', cerita: '' },

        // ============ CONFIG ============
        SHEET_URL: 'https://script.google.com/macros/s/AKfycbxw0_hpYQnUFXMgbCJQlAxgiLPOw_uCbNFA4F02uO2BEfmE_5e7wUH6kW80JGudJxo/exec',

        // ============ INIT ============
        init() {
            this.loadFromLocal();
            this.loadFromSheet();
            
            setInterval(() => {
                this.saveToLocal();
            }, 10000);
        },

        // ============ LOCAL STORAGE ============
        saveToLocal() {
            try {
                localStorage.setItem('dwali_students', JSON.stringify(this.students));
                localStorage.setItem('dwali_curhats', JSON.stringify(this.curhats));
                localStorage.setItem('dwali_user', JSON.stringify(this.currentUser));
            } catch(e) { console.error('Save local error:', e); }
        },

        loadFromLocal() {
            try {
                const students = localStorage.getItem('dwali_students');
                if (students) this.students = JSON.parse(students);
                
                const curhats = localStorage.getItem('dwali_curhats');
                if (curhats) this.curhats = JSON.parse(curhats);
                
                const user = localStorage.getItem('dwali_user');
                if (user) this.currentUser = JSON.parse(user);
            } catch(e) { console.error('Load local error:', e); }
        },

        // ============ SYNC TO SHEET ============
        async loadFromSheet() {
            try {
                await fetch(this.SHEET_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'getStudents' })
                });
                console.log('📤 Load students request sent');
            } catch(e) { console.error('Load from sheet error:', e); }
        },

        async syncStudentToSheet(student) {
            try {
                const data = {
                    ...student,
                    potensi: JSON.stringify(student.potensi || {}),
                    perbuatan_baik_today: student.perbuatan_baik_today ? 'true' : 'false'
                };
                
                await fetch(this.SHEET_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'saveStudent', student: data })
                });
                console.log('✅ Student sync sent:', student.name);
            } catch(e) { console.error('Sync student error:', e); }
        },

        async syncCurhatToSheet(curhat) {
            try {
                await fetch(this.SHEET_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'saveCurhat', curhat: curhat })
                });
                console.log('✅ Curhat sync sent');
            } catch(e) { console.error('Sync curhat error:', e); }
        },

        async syncReplyToSheet(curhatId, balasan) {
            try {
                await fetch(this.SHEET_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'replyCurhat', curhatId, balasan })
                });
                console.log('✅ Reply sync sent');
            } catch(e) { console.error('Sync reply error:', e); }
        },

        // ============ AUTH ============
        loginStudent() {
            if (this.loginForm.pin !== '51sw@qu') {
                this.showNotif('❌ PIN salah!');
                return;
            }
            
            let student = this.students.find(s => 
                s.name?.toLowerCase() === this.loginForm.name.toLowerCase() &&
                s.class?.toLowerCase() === this.loginForm.class.toLowerCase()
            );
            
            if (!student) {
                student = {
                    id: 's' + Date.now(),
                    name: this.loginForm.name,
                    nis: 'NEW',
                    class: this.loginForm.class,
                    is_potensi_filled: false,
                    perbuatan_baik_today: false,
                    nilai: 0,
                    sikap: 'Baik',
                    catatan: '',
                    potensi: {}
                };
                this.students.push(student);
                this.syncStudentToSheet(student);
                this.saveToLocal();
            }
            
            this.currentUser = student;
            this.isLoggedIn = true;
            this.role = 'student';
            this.studentView = student.is_potensi_filled ? 'dashboard' : 'potensi';
            this.saveToLocal();
        },

        loginAdmin() {
            if (this.loginForm.pass !== 'd4Rm@app*') {
                this.showNotif('❌ Password salah!');
                return;
            }
            this.currentUser = { name: 'Pak Wali 7A' };
            this.isLoggedIn = true;
            this.role = 'admin';
            this.saveToLocal();
        },

        logout() {
            this.isLoggedIn = false;
            this.currentUser = null;
            localStorage.removeItem('dwali_user');
        },

        // ============ STUDENT FEATURES ============
        savePotensi() {
            if (!this.currentUser) return;
            this.currentUser.is_potensi_filled = true;
            this.currentUser.potensi = this.potensiForm;
            
            const idx = this.students.findIndex(s => s.id === this.currentUser.id);
            if (idx !== -1) this.students[idx] = this.currentUser;
            
            this.studentView = 'dashboard';
            this.syncStudentToSheet(this.currentUser);
            this.saveToLocal();
            this.showNotif('✅ Peta Potensi Tersimpan!');
        },

        savePerbuatanBaik(act) {
            if (!this.currentUser) return;
            this.currentUser.perbuatan_baik_today = true;
            
            const idx = this.students.findIndex(s => s.id === this.currentUser.id);
            if (idx !== -1) this.students[idx] = this.currentUser;
            
            this.activeModal = null;
            this.syncStudentToSheet(this.currentUser);
            this.saveToLocal();
            
            const praises = ["🌟 Good Job! Kamu hebat!", "💪 Luar biasa!", "😇 Kamu anak baik!"];
            this.showNotif(praises[Math.floor(Math.random() * praises.length)]);
        },

        saveJurnal() {
            if (!this.currentUser) return;
            const jurnal = {
                id: 'j' + Date.now(),
                student_id: this.currentUser.id,
                ...this.jurnalForm,
                created_at: new Date().toISOString()
            };
            
            this.activeModal = null;
            this.jurnalForm = { perasaan: '', cerita: '' };
            
            // Simpan ke sheet (opsional)
            fetch(this.SHEET_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'saveJurnal', jurnal })
            });
            
            this.showNotif('✅ Jurnal Tersimpan!');
        },

        // ============ CURHAT ============
        openModal(type) {
            this.activeModal = type;
            if (type === 'curhat') {
                this.curhatStep = 1;
                this.curhatChat = [{ type: 'bot', text: 'Siapakah kamu?' }];
                this.curhatForm = { untuk: '', kategori: '', sub: '', darurat: '', cerita: '' };
            }
        },

        answerCurhat(field, value) {
            this.curhatForm[field] = value;
            this.curhatChat.push({ type: 'user', text: value });
            
            if (field === 'untuk') {
                this.curhatStep = 2;
                this.curhatChat.push({ type: 'bot', text: 'Kategori: Rumah atau Sekolah?' });
            } else if (field === 'kategori') {
                this.curhatStep = 3;
                this.curhatChat.push({ type: 'bot', text: `Masalah di ${value}?` });
            } else if (field === 'sub') {
                this.curhatStep = 4;
                this.curhatChat.push({ type: 'bot', text: 'Tingkat Darurat?' });
            } else if (field === 'darurat') {
                this.curhatStep = 5;
                const msg = value === 'Bantuan' ? '⚠️ Kami akan segera menghubungimu! Ceritakan dulu ya.' : 'Ceritakan masalahnya...';
                this.curhatChat.push({ type: 'bot', text: msg });
            }
        },

        submitCurhat() {
            if (!this.currentUser) return;
            
            const curhat = {
                id: 'c' + Date.now(),
                student_id: this.currentUser.id,
                ...this.curhatForm,
                tingkat_darurat: this.curhatForm.darurat,
                is_read: false,
                balasan: null,
                created_at: new Date().toISOString()
            };
            
            this.curhats.unshift(curhat);
            this.syncCurhatToSheet(curhat);
            this.saveToLocal();
            this.activeModal = null;
            this.showNotif('✅ Curhat terkirim! Sabar menunggu balasan ya.');
        },

        // ============ ADMIN FEATURES ============
        getStudentStatus(id) {
            const c = this.curhats.find(c => c.student_id === id && !c.balasan);
            if (!c) return '🟢';
            return c.tingkat_darurat === 'Bantuan' ? '🔴' : '🟡';
        },

        getStudentName(id) {
            const s = this.students.find(s => s.id === id);
            return s ? s.name : 'Unknown';
        },

        replyCurhat(id) {
            const c = this.curhats.find(c => c.id === id);
            if (!c) return;
            
            c.balasan = this.tempReply;
            this.syncReplyToSheet(id, this.tempReply);
            this.saveToLocal();
            this.tempReply = '';
            this.showNotif('✅ Balasan terkirim!');
        },

        addStudent() {
            if (!this.newStudent.name || !this.newStudent.nis) {
                this.showNotif('⚠️ Nama dan NIS harus diisi!');
                return;
            }
            
            const student = {
                id: 's' + Date.now(),
                ...this.newStudent,
                is_potensi_filled: false,
                perbuatan_baik_today: false,
                nilai: 0,
                sikap: 'Baik',
                catatan: '',
                potensi: {}
            };
            
            this.students.push(student);
            this.syncStudentToSheet(student);
            this.saveToLocal();
            this.newStudent = { name: '', nis: '', class: '' };
            this.showNotif('✅ Siswa ditambahkan!');
        },

        resetPass(id) {
            this.showNotif('🔑 Password direset ke: 51sw@qu');
        },

        deleteStudent(id) {
            this.students = this.students.filter(s => s.id !== id);
            
            // Kirim ke sheet
            fetch(this.SHEET_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'deleteStudent', studentId: id })
            });
            
            this.saveToLocal();
            this.showNotif('🗑️ Siswa dihapus!');
        },

        // ============ EXPORT EXCEL ============
        exportExcel() {
            if (this.students.length === 0) {
                this.showNotif('⚠️ Tidak ada data!');
                return;
            }
            
            const data = this.students.map(s => ({
                'Nama': s.name || '',
                'NIS': s.nis || '',
                'Kelas': s.class || '',
                'Nilai': s.nilai || 0,
                'Sikap': s.sikap || 'Baik',
                'Catatan': s.catatan || '',
                'Jumlah Curhat': this.curhats.filter(c => c.student_id === s.id).length
            }));
            
            const ws = XLSX.utils.json_to_sheet(data);
            ws['!cols'] = Object.keys(data[0]).map(key => ({ 
                wch: Math.max(key.length, ...data.map(d => String(d[key]).length)) 
            }));
            
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Laporan");
            XLSX.writeFile(wb, `Laporan_DWali_${new Date().toISOString().split('T')[0]}.xlsx`);
        },

        // ============ HELPER ============
        showNotif(text) {
            this.notif.text = text;
            this.notif.show = true;
            clearTimeout(this.notifTimer);
            this.notifTimer = setTimeout(() => { this.notif.show = false; }, 3000);
        }
    }
}
</script>
</body>
</html>
